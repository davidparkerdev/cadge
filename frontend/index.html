<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Stargate</title>
  </head>
  <body style="background:#0f0f0f;color:#fff">
    <div id="root">
      <!-- Inline loader: shown instantly, replaced when React mounts -->
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh">
        <div style="width:24px;height:24px;border-radius:50%;opacity:0.25;background:currentColor;animation:lp 1.2s ease-in-out infinite"></div>
      </div>
      <style>@keyframes lp{0%,100%{transform:scale(.7);opacity:.15}50%{transform:scale(1);opacity:.3}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
